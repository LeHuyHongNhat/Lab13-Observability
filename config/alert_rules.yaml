groups:
  - name: Lab13Alerts
    rules:
      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(request_latency_ms_bucket[5m])) by (le)) > 5000
        for: 2m
        labels:
          severity: P2
        annotations:
          summary: "High Latency (P95 > 5s)"
          runbook: "docs/alerts.md#1-high-latency-p95"

      - alert: HighErrorRate
        expr: (sum(rate(request_errors_total[5m])) / sum(rate(request_total[5m]))) * 100 > 5
        for: 1m
        labels:
          severity: P1
        annotations:
          summary: "High Error Rate (> 5%)"
          runbook: "docs/alerts.md#2-high-error-rate"

      - alert: SuddenTrafficDrop
        expr: sum(rate(request_total[5m])) < 0.1
        for: 5m
        labels:
          severity: P1
        annotations:
          summary: "Sudden Traffic Drop"
          runbook: "docs/alerts.md#4-sudden-traffic-drop"

      - alert: HighPIIRedaction
        expr: rate(pii_scrub_total[5m]) * 60 > 10
        for: 5m
        labels:
          severity: P2
        annotations:
          summary: "High PII Redaction Activity"
          runbook: "docs/alerts.md#5-pii-redaction-spike"
