server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: api_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: api_logs
          __path__: /var/log/app/logs.jsonl

    pipeline_stages:
      - json:
          expressions:
            level: level
            feature: feature
            model: model
            correlation_id: correlation_id
            session_id: session_id
            event: event
            user_id_hash: user_id_hash
            env: env
            message: payload.message_preview
      - labels:
          level:
          feature:
          model:
          correlation_id:
          session_id:
          event:
          user_id_hash:
          env:
